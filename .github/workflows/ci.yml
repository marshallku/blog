name: CI

on:
  push:
  pull_request:
    branches:
      - master

env:
  CI: true

jobs:
  check-spelling:
    name: Check spelling
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: marshallku/actions/analyze/spell@master
  rust:
    name: Lint, build and test (Rust)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: rustfmt, clippy
      - name: Set environment
        run: |
          cp .env.example .env
      - name: Check formatting
        run: cargo fmt --all --check
      - name: Lint
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Run tests
        run: cargo test --workspace
  frontend:
    name: Build frontend packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: marshallku/actions/setup/pnpm@master
      - name: Build packages and manifest
        run: pnpm build && pnpm manifest
  send-notification:
    needs: [check-spelling, rust, frontend]
    if: ${{ failure() }}
    uses: marshallku/actions/.github/workflows/send-notification.yml@master
    with:
      failed: ${{ contains(join(needs.*.result, ','), 'failure') }}
      message: "CI job failed - push"
    secrets:
      url: ${{ secrets.DISCORD_WEBHOOK_URI }}
