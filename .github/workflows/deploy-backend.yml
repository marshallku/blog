name: Deploy backend

on:
    push:
        branches:
            - master
            - chore/deploy
    workflow_dispatch:

concurrency: ${{ github.workflow }}-${{ github.ref }}

env:
    REGISTRY: ghcr.io
    IMAGE_NAME: marshallku/blog-backend

jobs:
    push-image:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Set up QEMU
              uses: docker/setup-qemu-action@v3

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Log in to the Container registry
              uses: docker/login-action@v3
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GH_PACKAGE_TOKEN }}

            # :latest only moves on the default branch so a branch push can
            # never poison what the server's compose pulls
            - name: Docker meta
              id: meta
              uses: docker/metadata-action@v5
              with:
                  images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
                  tags: |
                      type=raw,value=latest,enable={{is_default_branch}}
                      type=sha,prefix=,format=long
                      type=ref,event=branch
                      type=ref,event=pr

            - name: Build and push Docker image
              uses: docker/build-push-action@v6
              with:
                  context: .
                  file: docker/backend/Dockerfile
                  push: true
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max
    # Manual-trigger only until the server-side compose setup is confirmed
    # (run once via workflow_dispatch, then drop the `if` to deploy on every push)
    deploy:
        needs: [push-image]
        if: ${{ github.event_name == 'workflow_dispatch' }}
        runs-on: ubuntu-latest
        steps:
            - name: Run remote deploy script
              uses: appleboy/ssh-action@v1
              env:
                  GH_PACKAGE_TOKEN: ${{ secrets.GH_PACKAGE_TOKEN }}
              with:
                  host: ${{ secrets.SERVER_IP }}
                  port: ${{ secrets.SERVER_PORT }}
                  username: ${{ secrets.SERVER_USER }}
                  key: ${{ secrets.SSH_KEY }}
                  script: cd ~/dev/blog && git pull --ff-only && ./scripts/deploy-backend.sh
                  envs: GH_PACKAGE_TOKEN
    send-notification:
        needs: [push-image, deploy]
        if: ${{ failure() }}
        uses: marshallku/actions/.github/workflows/send-notification.yml@master
        with:
            failed: ${{ contains(join(needs.*.result, ','), 'failure') }}
            message: "CI job failed - push"
        secrets:
            url: ${{ secrets.DISCORD_WEBHOOK_URI }}
