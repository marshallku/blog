name: Deploy binary

on:
    push:
        branches:
            - master
        paths:
            - "crates/ssg/**"
            - "static/**"
            - "templates/**"
            - "manifest.json"
            - "packages/**"
            - "scripts/**"
    workflow_dispatch:

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
    contents: write

jobs:
    # Pull-based deploy: CI only publishes the binary to a rolling release. The
    # server (behind Tailscale, no public inbound) pulls it on a timer via
    # scripts/pull-deploy.sh — no SSH from the runner into the network.
    publish:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Set up Rust toolchain
              uses: actions-rust-lang/setup-rust-toolchain@v1

            - name: Build binary
              run: cargo build -p blog-ssg --release

            - name: Stage release artifacts
              run: |
                  mkdir -p release
                  cp target/release/blog release/blog
                  echo "${{ github.sha }}" > release/version.txt

            - name: Publish rolling release
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: deploy-latest
                  name: Rolling deploy
                  body: "Latest blog binary. Commit ${{ github.sha }}"
                  files: |
                      release/blog
                      release/version.txt
    send-notification:
        needs: [publish]
        if: ${{ failure() }}
        uses: marshallku/actions/.github/workflows/send-notification.yml@master
        with:
            failed: ${{ contains(join(needs.*.result, ','), 'failure') }}
            message: "Binary publish failed"
        secrets:
            url: ${{ secrets.DISCORD_WEBHOOK_URI }}
