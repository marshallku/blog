services:
    web:
        build: .
        ports:
            - "8088:80"
        restart: unless-stopped
        container_name: blog

    database:
        image: mongo:${MONGO_TAG:-4.4.28-focal}
        restart: always
        container_name: blog-database
        ports:
            - ${MONGO_PORT:-27017}:27017
        networks:
            - internal_network
        environment:
            - MONGO_INITDB_ROOT_USERNAME=${MONGO_USERNAME}
            - MONGO_INITDB_ROOT_PASSWORD=${MONGO_PASSWORD}
        volumes:
            - ./db:/data/db
            - ./config:/data/configdb
        env_file:
            - .env

    api:
        restart: unless-stopped
        container_name: blog-api
        image: ghcr.io/marshallku/blog-backend:${BACKEND_TAG:-latest}
        build:
            context: .
            dockerfile: docker/backend/Dockerfile
        depends_on:
            - database
        healthcheck:
            test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:${PORT:-8080}/health"]
            interval: 30s
            timeout: 5s
            retries: 3
        ports:
            - 48312:${PORT:-8080}
        env_file:
            - .env
        environment:
            - HOST=0.0.0.0
            - MONGO_HOST=database
            - TEMPLATE_PATH=templates/**/*.html
        networks:
            - internal_network
            - app_network

networks:
    app_network:
        external: true
    internal_network:
